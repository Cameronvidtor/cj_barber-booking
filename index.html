<!DOCTYPE html> 

<html> 

<head> 

<title>CJ Da Fader Booking</title> 

 

<style> 

 

body{ 

font-family:Arial; 

background:#111; 

color:white; 

text-align:center; 

} 

 

.container{ 

background:#222; 

width:380px; 

margin:auto; 

margin-top:40px; 

padding:25px; 

border-radius:10px; 

} 

 

input,select{ 

width:90%; 

padding:10px; 

margin:10px; 

} 

 

button{ 

padding:12px; 

width:95%; 

background:#00c853; 

color:white; 

border:none; 

font-size:16px; 

cursor:pointer; 

} 

 

.slot{ 

background:#333; 

padding:10px; 

margin:5px; 

cursor:pointer; 

border-radius:5px; 

} 

 

.slot:hover{ 

background:#00c853; 

} 

 

#dashboard{ 

margin-top:40px; 

background:#1c1c1c; 

padding:20px; 

} 

 

</style> 

 

</head> 

 

<body> 

 

<h1>CJ Da Fader 💈</h1> 

<h3>Book Your Cut</h3> 

 

<div class="container"> 

 

<input id="name" placeholder="Your Name"> 

 

<select id="service"> 

<option>Haircut - $40</option> 

<option>Haircut + Beard - $50</option> 

<option>Kids Cut - $30</option> 

</select> 

 

<input type="date" id="date"> 

 

<h3>Available Times</h3> 

<div id="slots"></div> 

 

<button onclick="book()">Confirm Appointment</button> 

 

<p id="msg"></p> 

 

</div> 

 

<div id="dashboard"> 

 

<h2>Barber Dashboard</h2> 

 

<button onclick="showAppointments()">View Appointments</button> 

 

<div id="appointments"></div> 

 

</div> 

 

<script> 

 

let times = [ 

"10:00 AM","10:30 AM","11:00 AM","11:30 AM", 

"12:00 PM","12:30 PM","1:00 PM","1:30 PM", 

"2:00 PM","2:30 PM","3:00 PM" 

] 

 

let selectedTime = "" 

 

let bookings = JSON.parse(localStorage.getItem("bookings")) || [] 

 

function renderSlots(){ 

 

let html="" 

 

times.forEach(time=>{ 

 

html+=`<div class="slot" onclick="selectTime('${time}')">${time}</div>` 

 

}) 

 

document.getElementById("slots").innerHTML = html 

 

} 

 

function selectTime(time){ 

 

selectedTime = time 

 

document.getElementById("msg").innerHTML="Selected: "+time 

 

} 

 

function book(){ 

 

let name=document.getElementById("name").value 

let service=document.getElementById("service").value 

let date=document.getElementById("date").value 

 

if(name==""||date==""||selectedTime==""){ 

 

alert("Fill all fields") 

 

return 

 

} 

 

let appointment={ 

name:name, 

service:service, 

date:date, 

time:selectedTime 

} 

 

bookings.push(appointment) 

 

localStorage.setItem("bookings",JSON.stringify(bookings)) 

 

document.getElementById("msg").innerHTML="✅ Appointment booked!" 

 

} 

 

function showAppointments(){ 

 

let html="" 

 

bookings.forEach(a=>{ 

 

html+=` 

<div> 

${a.name} | ${a.service} | ${a.date} | ${a.time} 

</div> 

` 

 

}) 

 

document.getElementById("appointments").innerHTML=html 

 

} 

 

renderSlots() 

 

</script> 

 

</body> 

</html>
